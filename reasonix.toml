# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.reasonix/config.toml > built-in defaults.
# Fields marked user/global only are not overridden by ./reasonix.toml.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
temperature       = 0.0
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune   = true   # elide stale tool results when reopening a session past the provider cache window
# planner_model = "deepseek-pro"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900   # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = ["Edit", "Bash(cd /Users/aoyuxuan/Documents/学习/项目/warehouse_scheduler && python -c \"\nfrom app.services.map_loader import MapLoader\nloader = MapLoader()\nwmap, errors = loader.load()\nif errors:\n    print('ERRORS:')\n    for e in errors:\n        print(f'  - {e}')\nelse:\n    print('Map loaded successfully!')\n    print(f'  Name: {wmap.name}')\n    print(f'  Size: {wmap.width}x{wmap.height}')\n    print(f'  Obstacles: {len(wmap.static_obstacles)}')\n    total_obs_cells = sum(len(o.cells) for o in wmap.static_obstacles)\n    print(f'  Obstacle cells: {total_obs_cells}')\n    print(f'  Locations: {len(wmap.locations)}')\n    print(f'  Corridors: {len(wmap.corridors)}')\n    total_free = wmap.width * wmap.height - total_obs_cells\n    print(f'  Free cells: {total_free} / {wmap.width * wmap.height} ({100*total_free/(wmap.width*wmap.height):.1f}%)')\n    \n    # Check all entry cells are walkable\n    for loc in wmap.locations:\n        for ex, ey in loc.entry_cells:\n            if wmap.is_obstacle(ex, ey):\n                print(f'  WARNING: location {loc.location_id} entry ({ex},{ey}) is obstacle!')\n    \n    print('  All entry cells OK.')\n\")", "Bash(cd /Users/aoyuxuan/Documents/学习/项目/warehouse_scheduler && python -c \"\nfrom app.services.map_loader import MapLoader\nfrom collections import deque\n\nloader = MapLoader()\nwmap, errors = loader.load()\n\n# BFS from (0,0) to check connectivity\nstart = (0, 0)\nif wmap.is_obstacle(*start):\n    # find first walkable cell\n    for y in range(wmap.height):\n        for x in range(wmap.width):\n            if wmap.is_walkable(x, y):\n                start = (x, y)\n                break\n        else:\n            continue\n        break\n\nvisited = set()\nq = deque([start])\nvisited.add(start)\n\nwhile q:\n    cx, cy = q.popleft()\n    for dx, dy in [(0,1),(0,-1),(1,0),(-1,0)]:\n        nx, ny = cx+dx, cy+dy\n        if wmap.is_walkable(nx, ny) and (nx, ny) not in visited:\n            visited.add(nx)\n            q.append((nx, ny))\n\ntotal_walkable = sum(1 for y in range(wmap.height) for x in range(wmap.width) if wmap.is_walkable(x,y))\nunreachable = total_walkable - len(visited)\n\nprint(f'Total walkable: {total_walkable}')\nprint(f'Reachable from {start}: {len(visited)}')\nif unreachable > 0:\n    print(f'UNREACHABLE cells: {unreachable}')\n    for y in range(wmap.height):\n        for x in range(wmap.width):\n            if wmap.is_walkable(x,y) and (x,y) not in visited:\n                print(f'  - ({x},{y})')\nelse:\n    print('All walkable cells are reachable! ✓')\n\n# Print a simple ASCII map\nprint()\nprint('Map visualization (# = obstacle, . = free):')\nfor y in range(wmap.height):\n    row = ''\n    for x in range(wmap.width):\n        row += '#' if wmap.is_obstacle(x,y) else '.'\n    print(f'{y:2d} {row}')\n\")", "Bash(cd /Users/aoyuxuan/Documents/学习/项目/warehouse_scheduler && timeout 30 python3 << 'PYEOF'\nfrom app.services.map_loader import MapLoader\nfrom collections import deque\n\nloader = MapLoader()\nwmap, errors = loader.load()\n\nstart = (0, 0)\nif wmap.is_obstacle(*start):\n    for y in range(wmap.height):\n        for x in range(wmap.width):\n            if wmap.is_walkable(x, y):\n                start = (x, y)\n                break\n        else:\n            continue\n        break\n\nvisited = set()\nq = deque([start])\nvisited.add(start)\n\nwhile q:\n    cx, cy = q.popleft()\n    for dx, dy in [(0,1),(0,-1),(1,0),(-1,0)]:\n        nx, ny = cx+dx, cy+dy\n        if wmap.is_walkable(nx, ny) and (nx, ny) not in visited:\n            visited.add((nx, ny))\n            q.append((nx, ny))\n\ntotal_walkable = sum(1 for y in range(wmap.height) for x in range(wmap.width) if wmap.is_walkable(x,y))\nunreachable = total_walkable - len(visited)\n\nprint(f'Total walkable: {total_walkable}')\nprint(f'Reachable from {start}: {len(visited)}')\nif unreachable > 0:\n    print(f'UNREACHABLE cells: {unreachable}')\nelse:\n    print('All walkable cells are reachable!')\n\nprint()\nfor y in range(wmap.height):\n    row = ''\n    for x in range(wmap.width):\n        row += '#' if wmap.is_obstacle(x,y) else '.'\n    print(f'{y:2d} {row}')\nPYEOF)", "Bash(cd /Users/aoyuxuan/Documents/学习/项目/warehouse_scheduler && python3 << 'PYEOF'\nfrom app.services.map_loader import MapLoader\nfrom collections import deque\n\nloader = MapLoader()\nwmap, errors = loader.load()\n\nstart = (0, 0)\nif wmap.is_obstacle(*start):\n    for y in range(wmap.height):\n        for x in range(wmap.width):\n            if wmap.is_walkable(x, y):\n                start = (x, y)\n                break\n        else:\n            continue\n        break\n\nvisited = set()\nq = deque([start])\nvisited.add(start)\n\nwhile q:\n    cx, cy = q.popleft()\n    for dx, dy in [(0,1),(0,-1),(1,0),(-1,0)]:\n        nx, ny = cx+dx, cy+dy\n        if wmap.is_walkable(nx, ny) and (nx, ny) not in visited:\n            visited.add((nx, ny))\n            q.append((nx, ny))\n\ntotal_walkable = sum(1 for y in range(wmap.height) for x in range(wmap.width) if wmap.is_walkable(x,y))\nunreachable = total_walkable - len(visited)\n\nprint(f'Total walkable: {total_walkable}')\nprint(f'Reachable from {start}: {len(visited)}')\nif unreachable > 0:\n    print(f'UNREACHABLE cells: {unreachable}')\nelse:\n    print('All walkable cells are reachable!')\nPYEOF)", "explore"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
# [[plugins]]
# name    = "example"
# command = "reasonix-plugin-example"
# [[plugins]]                                  # a remote server over Streamable HTTP
# name    = "stripe"
# type    = "http"
# url     = "https://mcp.stripe.com"
# headers = { Authorization = "Bearer ${STRIPE_KEY}" }
